<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدوات المصمم - Sidi Gaber</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #000; color: #fff; font-family: 'Cairo', sans-serif;
            padding: 40px 20px; margin: 0;
        }
        .back-btn {
            color: #00f5ff; text-decoration: none; font-size: 18px;
            margin-bottom: 30px; display: inline-block;
        }
        .back-btn:hover { text-shadow: 0 0 10px #00f5ff; }
        .page-title {
            text-align: center; color: #00f5ff; font-size: 32px;
            margin-bottom: 50px; text-shadow: 0 0 20px #00f5ff;
        }
        .tools-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }
        .tool-card {
            background: rgba(0, 245, 255, 0.05); border: 1px solid #00f5ff;
            border-radius: 16px; padding: 30px; text-align: center;
            transition: 0.3s; text-decoration: none; color: #fff;
        }
        .tool-card:hover {
            transform: translateY(-10px); box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
            background: rgba(0, 245, 255, 0.1);
        }
        .tool-card i { font-size: 50px; color: #00f5ff; margin-bottom: 15px; }
        .tool-card h3 { color: #00f5ff; margin: 10px 0; }
        .tool-card p { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← رجوع للرئيسية</a>
    <h1 class="page-title">• TOOLS ∞ RESOURCES •</h1>
    
    <div class="tools-grid">
        <!-- كارت أدوبي فوتوشوب -->
        <a href="https://www.adobe.com/products/photoshop.html" target="_blank" class="tool-card">
            <i class="fa-solid fa-image"></i>
            <h3>Adobe Photoshop</h3>
            <p>أقوى برنامج تعديل صور وتصميم</p>
        </a>

        <!-- كارت أدوبي اليستريتور -->
        <a href="https://www.adobe.com/products/illustrator.html" target="_blank" class="tool-card">
            <i class="fa-solid fa-bezier-curve"></i>
            <h3>Adobe Illustrator</h3>
            <p>تصميم لوجوهات وفيكتور احترافي</p>
        </a>

        <!-- كارت فيجما -->
        <a href="https://www.figma.com" target="_blank" class="tool-card">
            <i class="fab fa-figma"></i>
            <h3>Figma</h3>
            <p>تصميم واجهات المواقع والتطبيقات</p>
        </a>

        <!-- كارت كانفا -->
        <a href="https://www.canva.com" target="_blank" class="tool-card">
            <i class="fa-solid fa-palette"></i>
            <h3>Canva</h3>
            <p>تصميمات سوشيال ميديا سريعة</p>
        </a>

        <!-- ضيف أي موقع تاني بنفس الطريقة -->
        
    </div>
</body>
</html>
